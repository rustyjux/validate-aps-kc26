name: Deploy Configuration
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v1
        with:
          node-version: 14
          TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get GWA Command Line
        run: |
          GWA_CLI_VERSION=v3.0.6; curl -L -O https://github.com/bcgov/gwa-cli/releases/download/${GWA_CLI_VERSION}/gwa_${GWA_CLI_VERSION}_linux_x64.zip
          unzip gwa_${GWA_CLI_VERSION}_linux_x64.zip

      - name: Apply Namespace
        env:
          NS: gw-143d8
        run: |
          export PATH=`pwd`:$PATH
          cd .gwa
          # gwa config set host api-gov-bc-ca.dev.api.gov.bc.ca
          gwa config set host api-gov-bc-ca.test.api.gov.bc.ca
          # gwa config set host api.gov.bc.ca
          
          gwa login \
          --client-id=${{ secrets.GWA_ACCT_ID }} \
          --client-secret=${{ secrets.GWA_ACCT_SECRET }}
          gwa config set gateway $NS
          gwa pg
